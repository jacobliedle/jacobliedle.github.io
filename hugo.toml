baseURL = 'https://jacobliedle.github.io/'
languageCode = 'en-us'
title = 'Argo Media Group'
theme = 'jl-cinematic'

[params]
  brand = "Argo Media Group"
  description = "Full service video production based in Denver, Colorado. Commercial, documentary, music video, and narrative filmmaking."

  # Hero section
  heroTagline = "Inspire. Create."
  heroSubtitle = "Full Service Video Production — Denver, Colorado"
  heroCTA = "See Our Work"
  heroCTALink = "/work/"
  heroVideoFile = "/videos/hero-background.mp4"
  heroPoster = "/images/argo-originals/homepage-hero-video-still.jpg"

  # About teaser on homepage
  aboutTeaserTitle = "Filmmakers, storytellers, collaborators."
  aboutTeaser = "Video plays a vital role in our modern world. It is a beautiful synergy of many disciplines and art forms, and requires true dedication and commitment to master. Anyone can point a camera — it takes an artist to tell a great story. We are a team of creative professionals committed to the lifelong journey of perfecting our craft."
  aboutTeaserImage = "/images/argo-originals/amg-behind-the-scenes-split.jpg"

  # Services on homepage
  servicesTitle = "Full Service Video Production"
  [[params.services]]
    title = "Commercial"
    description = "Brand films, product spots, and corporate storytelling that connects with your audience."
  [[params.services]]
    title = "Documentary"
    description = "Real stories told with cinematic craft. From short docs to feature-length projects."
  [[params.services]]
    title = "Music Video"
    description = "Creative visual storytelling that amplifies the music and connects with fans."
  [[params.services]]
    title = "Narrative"
    description = "Short and long form narratives brought to life with intentional cinematography."

  # Featured work for homepage thumbnails
  [[params.featuredWork]]
    title = "Haymaker Promo"
    type = "Commercial"
  [[params.featuredWork]]
    title = "Documentary Short"
    type = "Documentary"
  [[params.featuredWork]]
    title = "Artist Music Video"
    type = "Music Video"

  # Testimonials — swap placeholder text for real quotes when ready
  [[params.testimonials]]
    quote = "Argo delivered a final product that exceeded every expectation. The team understood our brand immediately and brought a level of craft that made us look world-class."
    author = "Client Name"
    company = "Company — Placeholder"
  [[params.testimonials]]
    quote = "Professional, creative, and genuinely easy to work with. They made the whole process feel effortless and came back with something we're proud to put in front of our audience."
    author = "Client Name"
    company = "Company — Placeholder"
  [[params.testimonials]]
    quote = "We saw real engagement lift after launching the brand film. Not just a pretty video — it actually moved the needle. We'll be back for the next one."
    author = "Client Name"
    company = "Company — Placeholder"

  # Client logos — add entries here when available
