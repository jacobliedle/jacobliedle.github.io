baseURL = 'https://jacobliedle.github.io/'
languageCode = 'en-us'
title = 'Argo Media Group'
theme = 'jl-cinematic'

[params]
  brand = "Jacob Liedle"
  description = "Director and cinematographer based in Denver, Colorado. Commercial, documentary, music video, and narrative filmmaking."

  # Hero section
  heroTagline = "It takes an artist to tell a <em>great story</em>."
  heroSubtitle = "Director & Cinematographer — Denver, Colorado"
  heroCTA = "Watch the Reel"
  heroCTALink = "/reel/"
  heroVideoFile = "/videos/hero-background.mp4"
  heroPoster = "/images/argo-originals/homepage-hero-video-still.jpg"

  # About teaser on homepage (with BTS background image)
  aboutTeaserTitle = "Filmmaker, storyteller, collaborator."
  aboutTeaser = "Video plays a vital role in our modern world. It is a beautiful synergy of many disciplines and art forms, and requires true dedication and commitment to master. It takes an artist to tell a great story."
  aboutTeaserImage = "/images/argo-originals/amg-behind-the-scenes-split.jpg"

  # Services on homepage
  servicesTitle = "Crafting Visual Stories"
  [[params.services]]
    title = "Commercial"
    description = "Brand films, product spots, and corporate storytelling that connects with your audience."
  [[params.services]]
    title = "Documentary"
    description = "Real stories told with cinematic craft. From short docs to feature-length projects."
  [[params.services]]
    title = "Music Video"
    description = "Creative visual storytelling that amplifies the music and connects with fans."
  [[params.services]]
    title = "Narrative"
    description = "Short and long form narratives brought to life with intentional cinematography."

# Navigation
[menus]
  [[menus.main]]
    name = "Reel"
    url = "/reel/"
    weight = 1
  [[menus.main]]
    name = "About"
    url = "/about/"
    weight = 2
  [[menus.main]]
