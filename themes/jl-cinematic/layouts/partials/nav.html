<nav class="nav">
  <div class="nav__inner">
    <a href="{{ "/" | relURL }}" class="nav__brand">{{ site.Params.brand | default site.Title }}</a>
    <button class="nav__toggle" onclick="document.querySelector('.nav__links').classList.toggle('nav__links--open')" aria-label="Toggle menu">&#9776;</button>
    <ul class="nav__links">
      {{ range site.Menus.main }}
      <li>
        <a href="{{ .URL }}" class="nav__link{{ if $.IsMenuCurrent "main" . }} nav__link--active{{ end }}">{{ .Name }}</a>
      </li>
      {{ end }}
    </ul>
  </div>
</nav>
